syntax = "proto3";

message NoiseRecording {
  uint32 seq_no  = 1;   // per-second (live) or per-minute (disk) counter; gap detection
  bytes  bands   = 2;   // 31 bytes; (dB - 20) * 2 per band, averaged over the interval
  uint32 laeq    = 3;   // (dB - 20) * 2 — LAeq over the record's interval
  uint32 lceq    = 4;   // LCeq over the interval
  uint32 lafmax  = 5;   // max over the interval
  uint32 lcfmax  = 6;
  uint32 lcpeak  = 7;
  uint32 record_interval_seconds = 8;  // 1 = live 1 Hz, 60 = on-disk minute aggregate
  optional uint32 battery_mv = 9;      // millivolts; only set on live messages when on battery
  optional uint32 laeq_5m  = 10;       // last 5 min, same encoding; only once the ring is full
  optional uint32 lceq_5m  = 11;
  optional uint32 laeq_30m = 12;       // last 30 min
  optional uint32 lceq_30m = 13;
}
